<h2>输入区交互设计</h2>
<p class="subtitle">两个 URL 输入框 + 比对按钮，如何排列？</p>

<div class="cards">

  <div class="card" data-choice="A" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#0f1117;border-radius:8px;padding:16px;">
        <div style="background:#1a1b2e;border-radius:8px;padding:14px;">
          <div style="display:flex;gap:8px;align-items:center;">
            <div style="flex:1;background:#252640;border:1px solid rgba(99,102,241,0.3);border-radius:8px;padding:9px 12px;color:#9ca3af;font-size:11px;font-family:monospace;">粘贴图片 A URL...</div>
            <div style="flex:1;background:#252640;border:1px solid rgba(99,102,241,0.3);border-radius:8px;padding:9px 12px;color:#9ca3af;font-size:11px;font-family:monospace;">粘贴图片 B URL...</div>
            <div style="background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:9px 20px;border-radius:8px;font-size:12px;font-weight:700;white-space:nowrap;box-shadow:0 2px 10px rgba(99,102,241,0.4);">比 对</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A — 三列同行（推荐）</h3>
      <p>A URL · B URL · 按钮 同一行，操作最快，类似搜索框体验。视觉最紧凑。</p>
    </div>
  </div>

  <div class="card" data-choice="B" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#0f1117;border-radius:8px;padding:16px;">
        <div style="background:#1a1b2e;border-radius:8px;padding:14px;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
            <div>
              <div style="color:#818cf8;font-size:10px;margin-bottom:4px;font-family:monospace;">图片 A</div>
              <div style="background:#252640;border:1px solid rgba(99,102,241,0.25);border-radius:8px;padding:9px 12px;color:#9ca3af;font-size:11px;font-family:monospace;">粘贴 URL...</div>
            </div>
            <div>
              <div style="color:#818cf8;font-size:10px;margin-bottom:4px;font-family:monospace;">图片 B</div>
              <div style="background:#252640;border:1px solid rgba(99,102,241,0.25);border-radius:8px;padding:9px 12px;color:#9ca3af;font-size:11px;font-family:monospace;">粘贴 URL...</div>
            </div>
          </div>
          <div style="background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:9px;border-radius:8px;text-align:center;font-size:12px;font-weight:700;box-shadow:0 2px 10px rgba(99,102,241,0.4);">开始比对</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B — 两行布局</h3>
      <p>上行两列输入（带标签），下行全宽按钮。标签让用户更清楚 A/B 的区别。</p>
    </div>
  </div>

  <div class="card" data-choice="C" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#0f1117;border-radius:8px;padding:16px;">
        <div style="background:#1a1b2e;border-radius:8px;padding:14px;">
          <div style="display:flex;gap:6px;align-items:stretch;margin-bottom:8px;">
            <div style="flex:1;background:#252640;border:1px solid rgba(99,102,241,0.25);border-radius:8px;padding:9px 12px;color:#9ca3af;font-size:11px;font-family:monospace;">图片 A URL...</div>
          </div>
          <div style="display:flex;justify-content:center;align-items:center;color:#4b5563;font-size:18px;margin:4px 0;">⇅</div>
          <div style="display:flex;gap:6px;align-items:stretch;margin-bottom:10px;">
            <div style="flex:1;background:#252640;border:1px solid rgba(99,102,241,0.25);border-radius:8px;padding:9px 12px;color:#9ca3af;font-size:11px;font-family:monospace;">图片 B URL...</div>
          </div>
          <div style="background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:9px;border-radius:8px;text-align:center;font-size:12px;font-weight:700;">比 对</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>C — 垂直堆叠</h3>
      <p>A / 分隔符 / B / 按钮，上下结构。有比较感，但占据较多垂直空间。</p>
    </div>
  </div>

</div>
